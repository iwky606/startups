<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>初创公司 — StartUps</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="felt-bg min-h-screen flex flex-col items-center justify-center p-4">

<!-- Toast 容器 -->
<div id="toast-container" class="toast-container"></div>

<!-- 主卡片 -->
<div class="w-full max-w-sm panel-glass p-8 flex flex-col gap-6">

  <!-- 标题区 -->
  <div class="text-center flex flex-col items-center gap-3">
    <!-- 浮动动物 -->
    <div class="flex gap-3 text-4xl select-none" aria-hidden="true">
      <span class="float-1">🦒</span>
      <span class="float-2">🐶</span>
      <span class="float-3">🦢</span>
      <span class="float-4">🐙</span>
      <span class="float-5">🦛</span>
      <span class="float-6">🐘</span>
    </div>
    <h1 class="text-3xl font-black text-white tracking-wide leading-tight">
      初 创 公 司
    </h1>
    <p class="text-sm font-medium" style="color:rgba(255,255,255,0.55); letter-spacing:0.05em">
      StartUps
    </p>
  </div>

  <!-- 昵称输入 -->
  <div>
    <label class="block text-sm font-semibold text-white/80 mb-2">你的昵称</label>
    <input
      id="nickname"
      type="text"
      class="input-field"
      placeholder="1-8个字符"
      maxlength="8"
      autocomplete="off"
      spellcheck="false"
    >
    <p id="nickname-error" class="error-text"></p>
  </div>

  <!-- 创建房间 -->
  <button id="btn-create" class="btn btn-primary btn-lg w-full" onclick="handleCreate()">
    创建房间
  </button>

  <!-- 开局移除张数 -->
  <div style="padding:10px 12px;background:rgba(0,0,0,0.2);border-radius:10px;display:flex;align-items:center;gap:10px;margin-top:-8px">
    <label style="font-size:13px;color:rgba(255,255,255,0.65);white-space:nowrap;flex:1">开局随机移除</label>
    <input
      id="remove-count"
      type="number"
      class="input-field"
      value="5"
      min="0"
      max="40"
      style="width:68px;padding:6px 10px;font-size:15px;font-weight:700;text-align:center"
    >
    <span style="font-size:12px;color:rgba(255,255,255,0.4);white-space:nowrap">张牌</span>
  </div>

  <!-- 分割线 -->
  <div class="divider">或者</div>

  <!-- 加入房间 -->
  <div>
    <label class="block text-sm font-semibold text-white/80 mb-2">房间码</label>
    <input
      id="room-code"
      type="text"
      class="input-field"
      placeholder="6位房间码"
      maxlength="6"
      autocomplete="off"
      spellcheck="false"
      style="text-transform:uppercase; letter-spacing:0.15em; font-size:18px; font-weight:700;"
    >
    <p id="room-code-error" class="error-text"></p>
  </div>

  <button id="btn-join" class="btn btn-secondary btn-lg w-full" onclick="handleJoin()">
    加入房间
  </button>

  <!-- 底部说明 -->
  <p class="text-center text-xs" style="color:rgba(255,255,255,0.35)">
    3 - 7 人 &nbsp;·&nbsp; 卡牌策略桌游 &nbsp;·&nbsp; 10-20 分钟
  </p>

</div>

<script>
// ── 初始化：检查 URL 参数 ────────────────────────────────────────────────
(function init() {
  const params = new URLSearchParams(location.search);
  const code = params.get('code') || params.get('room');
  if (code) {
    document.getElementById('room-code').value = code.toUpperCase().slice(0, 6);
    document.getElementById('nickname').focus();
  }
})();

// 房间码输入自动大写+只允许字母数字
document.getElementById('room-code').addEventListener('input', (e) => {
  e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
});

// ── 校验 ─────────────────────────────────────────────────────────────────
function validateNickname() {
  const name = document.getElementById('nickname').value.trim();
  if (!name) { setFieldError('nickname', '请输入昵称'); return null; }
  if (name.length > 8) { setFieldError('nickname', '昵称最多8个字符'); return null; }
  clearFieldError('nickname');
  return name;
}

function setFieldError(field, msg) {
  const isNick = field === 'nickname';
  document.getElementById(isNick ? 'nickname' : 'room-code').classList.add('error');
  document.getElementById(isNick ? 'nickname-error' : 'room-code-error').textContent = msg;
}
function clearFieldError(field) {
  const isNick = field === 'nickname';
  document.getElementById(isNick ? 'nickname' : 'room-code').classList.remove('error');
  document.getElementById(isNick ? 'nickname-error' : 'room-code-error').textContent = '';
}

// ── 创建房间：只做校验，导航交给 room.html 处理 ──────────────────────────
function handleCreate() {
  const name = validateNickname();
  if (!name) return;
  const removeCount = parseInt(document.getElementById('remove-count').value, 10);
  sessionStorage.setItem('player_name', name);
  sessionStorage.setItem('room_action', 'create');
  sessionStorage.setItem('remove_count', isNaN(removeCount) ? '5' : String(Math.max(0, Math.min(40, removeCount))));
  window.location.href = '/room?action=create';
}

// ── 加入房间：只做校验，导航交给 room.html 处理 ──────────────────────────
function handleJoin() {
  const name = validateNickname();
  if (!name) return;

  const code = document.getElementById('room-code').value.trim().toUpperCase();
  if (!code) { setFieldError('room-code', '请输入房间码'); return; }
  if (code.length !== 6) { setFieldError('room-code', '房间码应为6位'); return; }
  clearFieldError('room-code');

  sessionStorage.setItem('player_name', name);
  sessionStorage.setItem('room_action', 'join');
  sessionStorage.setItem('room_code', code);
  window.location.href = `/room?code=${code}`;
}

// Enter 键支持
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  const code = document.getElementById('room-code').value.trim();
  if (code.length === 6) handleJoin();
  else handleCreate();
});
</script>
</body>
</html>
