<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>游戏进行中 — 动物股东</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="game-body">

<!-- 连接状态角标 -->
<div id="conn-badge" class="conn-badge">⬤ 连接中</div>

<!-- 回合指示器 -->
<div id="turn-banner" class="turn-banner waiting">
  <span id="turn-text">连接中…</span>
</div>

<!-- 主棋盘 -->
<div class="game-board">

  <!-- 上方对手区（槽位 ⑤⑥） -->
  <div class="area-top-opp" id="top-opp-area">
    <div class="opp-slot" id="slot-5" style="display:none"></div>
    <div class="opp-slot" id="slot-6" style="display:none"></div>
  </div>

  <!-- 左侧对手（槽位 ③ 上 / ① 下） -->
  <div class="area-left-opp">
    <div class="opp-slot" id="slot-3" style="display:none"></div>
    <div class="opp-slot" id="slot-1" style="display:none"></div>
  </div>

  <!-- 中央市场 -->
  <div class="area-market">
    <div class="market-grid" id="market-grid">
      <!-- 由 game.js 渲染 -->
    </div>
  </div>

  <!-- 右侧对手（槽位 ④ 上 / ② 下） -->
  <div class="area-right-opp">
    <div class="opp-slot" id="slot-4" style="display:none"></div>
    <div class="opp-slot" id="slot-2" style="display:none"></div>
  </div>

  <!-- 自己区域 -->
  <div class="area-self">
    <!-- 操作栏（play 阶段才显示） -->
    <div id="action-bar" class="action-bar" style="display:none">
      <button id="btn-play-market" class="btn btn-primary btn-sm" disabled>打出到市场</button>
      <button id="btn-play-area"   class="btn btn-secondary btn-sm" disabled>放入放置区</button>
    </div>
    <!-- 手牌区 -->
    <div id="hand-area" class="hand-area"></div>
    <!-- 自己面板 -->
    <div id="self-panel" class="self-panel"></div>
  </div>

</div><!-- .game-board -->

<!-- ── 调试面板（按 ` 键切换） ─────────────────────────────────────────── -->
<div id="debug-panel" class="debug-panel" style="display:none">
  <div class="debug-toolbar">
    <strong style="color:#f0c040;font-size:12px">🔧 调试</strong>
    <span style="color:#555;font-size:10px">按 ` 关闭</span>

    <button onclick="gameWS.send('draw_card')">摸牌</button>

    <label>手牌 #</label>
    <input id="dbg-hi" type="number" value="0" min="0" max="3">
    <button onclick="gameWS.send('play_to_market',{hand_index:+document.getElementById('dbg-hi').value})">→市场</button>
    <button onclick="gameWS.send('play_to_area',{hand_index:+document.getElementById('dbg-hi').value})">→放置区</button>

    <label>市场 #</label>
    <input id="dbg-mi" type="number" value="0" min="0">
    <button onclick="gameWS.send('pick_market',{card_index:+document.getElementById('dbg-mi').value})">取市场</button>
  </div>
  <div class="debug-body">
    <div id="debug-log" class="debug-log"></div>
    <pre id="debug-json" class="debug-json">等待服务器推送…</pre>
  </div>
</div>

<script src="/static/js/websocket.js"></script>
<script src="/static/js/game.js"></script>
</body>
</html>
