<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>房间等待 - 初创公司</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/static/css/style.css">
<style>
#player-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
@media (max-width: 480px) {
  #player-grid { grid-template-columns: repeat(2, 1fr); }
}
@keyframes pulse-ring {
  0%   { box-shadow: 0 0 0 0 rgba(74,222,128,0.5); }
  70%  { box-shadow: 0 0 0 8px rgba(74,222,128,0); }
  100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
}
.player-slot.ready-pulse { animation: pulse-ring 2s ease-out infinite; }
#connecting-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 50;
}
</style>
</head>
<body class="felt-bg min-h-screen flex flex-col">

<div id="toast-container" class="toast-container"></div>

<div id="connecting-overlay">
  <span class="spinner" style="width:32px;height:32px;border-width:3px"></span>
  <p style="color:#fff;font-size:16px" id="connecting-text">连接服务器中...</p>
</div>

<header class="flex items-center justify-between px-6 py-4" style="background:rgba(0,0,0,0.2);">
  <a href="/" class="btn btn-sm btn-secondary" onclick="handleLeave(event)">返回首页</a>
  <span class="font-bold text-white/80 text-sm tracking-wider">初创公司</span>
  <div style="width:80px"></div>
</header>

<main class="flex-1 flex flex-col items-center justify-center p-4 gap-6">
  <div class="panel-glass p-6 w-full max-w-md text-center flex flex-col gap-4">
    <p class="text-white/60 text-sm font-medium tracking-wider uppercase">房间码</p>
    <div id="room-code-display" class="room-code-display">------</div>
    <div class="flex gap-3 justify-center flex-wrap">
      <button class="btn btn-sm btn-ghost" id="btn-copy-code" onclick="copyCode()">复制房间码</button>
      <button class="btn btn-sm btn-ghost" id="btn-copy-link" onclick="copyLink()">复制邀请链接</button>
    </div>
  </div>

  <div class="panel-glass p-6 w-full max-w-md flex flex-col gap-4">
    <div class="flex items-center justify-between">
      <h2 class="font-bold text-white text-base">等待玩家加入</h2>
      <span id="player-count" class="text-white/50 text-sm">0 / 7</span>
    </div>
    <div id="player-grid"></div>
    <p class="text-center text-xs text-white/35 pt-1">至少 3 人 · 最多 7 人</p>
  </div>

  <div class="flex flex-col gap-3 w-full max-w-md">
    <button id="btn-ready" class="btn btn-primary btn-lg w-full" onclick="toggleReady()" style="display:none">
      准备
    </button>
    <div id="host-area" style="display:none" class="flex flex-col gap-3">
      <div class="panel-glass p-4 flex items-center justify-between gap-3">
        <div>
          <div class="text-white text-sm font-semibold">人机管理</div>
          <div id="bot-summary" class="text-xs text-white/45">当前 0 名人机</div>
        </div>
        <div class="flex gap-2">
          <button id="btn-remove-bot" class="btn btn-sm btn-secondary" onclick="removeBot()">- AI</button>
          <button id="btn-add-bot" class="btn btn-sm btn-primary" onclick="addBot()">+ AI</button>
        </div>
      </div>
      <button id="btn-start" class="btn btn-primary btn-lg w-full" onclick="startGame()" disabled>
        开始游戏
      </button>
      <p id="start-hint" class="text-center text-xs text-white/50">至少需要 3 位玩家才能开始</p>
    </div>
  </div>
</main>

<script src="/static/js/websocket.js"></script>
<script>
let roomCode = null;
let myId = null;
let myName = null;
let players = [];
let isHost = false;
let isReady = false;

(function init() {
  const params = new URLSearchParams(location.search);
  const action = params.get('action');
  const code = params.get('code');
  myName = sessionStorage.getItem('player_name');

  if (!myName) {
    window.location.href = '/';
    return;
  }

  if (code) {
    roomCode = code.toUpperCase();
    document.getElementById('room-code-display').textContent = roomCode;
  }

  gameWS.on('room_created', handleRoomCreated);
  gameWS.on('room_update', handleRoomUpdate);
  gameWS.on('game_start', handleGameStart);
  gameWS.on('error', handleError);

  setConnectingText('连接服务器中...');
  gameWS.connect();
  gameWS.on('open', () => {
    if (action === 'create') {
      setConnectingText('正在创建房间...');
      const removeCount = parseInt(sessionStorage.getItem('remove_count') || '5', 10);
      gameWS.send('create_room', { player_name: myName, remove_count: removeCount });
    } else if (code) {
      setConnectingText('正在加入房间...');
      gameWS.send('join_room', { room_code: code.toUpperCase(), player_name: myName });
    } else {
      window.location.href = '/';
    }
  });
})();

function handleRoomCreated(msg) {
  myId = msg.player_id;
  roomCode = msg.room_code;
  sessionStorage.setItem('room_code', roomCode);
  document.getElementById('room-code-display').textContent = roomCode;
  hideConnectingOverlay();
}

function handleRoomUpdate(msg) {
  players = msg.players;
  roomCode = msg.room_code;

  if (!myId) {
    const me = players.find((p) => p.name === myName);
    if (me) myId = me.id;
  }

  const me = players.find((p) => p.id === myId);
  isHost = me ? me.is_host : false;
  isReady = me ? me.is_ready : false;

  hideConnectingOverlay();
  renderPlayers();
  renderControls();
}

function handleGameStart() {
  sessionStorage.setItem('room_code', roomCode);
  window.location.href = `/game?code=${roomCode}`;
}

function handleError(msg) {
  hideConnectingOverlay();
  showToast(msg.message || '发生错误', 'error', 5000);
}

function renderPlayers() {
  const grid = document.getElementById('player-grid');
  grid.innerHTML = '';

  for (let i = 0; i < 7; i++) {
    const p = players[i] || null;
    const div = document.createElement('div');

    if (!p) {
      div.className = 'player-slot empty';
      div.innerHTML = `
        <div class="w-11 h-11 rounded-full border-2 border-dashed border-white/20 flex items-center justify-center">
          <span style="font-size:18px;opacity:0.3">+</span>
        </div>
        <span class="text-xs text-white/25">等待中</span>
      `;
    } else {
      const isSelf = p.id === myId;
      const colors = ['#f59e0b', '#10b981', '#3b82f6', '#a855f7', '#ef4444', '#06b6d4', '#f97316'];
      const bg = colors[players.indexOf(p) % colors.length];

      let badge = '';
      if (p.is_host) badge = `<span class="status-badge status-host">房主</span>`;
      else if (p.is_bot) badge = `<span class="status-badge status-ready">AI</span>`;
      else if (p.is_ready) badge = `<span class="status-badge status-ready">已准备</span>`;
      else badge = `<span class="status-badge status-waiting">等待中</span>`;

      div.className = 'player-slot occupied' +
        (isSelf ? ' me' : '') +
        (p.is_ready && !p.is_host && !p.is_bot ? ' ready-pulse' : '');
      div.innerHTML = `
        <div class="avatar" style="background:linear-gradient(135deg,${bg},${bg}cc)">
          ${p.is_bot ? 'AI' : avatarEmoji(p.name)}
        </div>
        <span class="text-sm font-semibold text-white truncate max-w-full px-1"
              title="${esc(p.name)}">${esc(p.name)}${isSelf ? ' (我)' : ''}</span>
        ${badge}
      `;
    }

    grid.appendChild(div);
  }

  document.getElementById('player-count').textContent = `${players.length} / 7`;
}

function renderControls() {
  const btnReady = document.getElementById('btn-ready');
  const hostArea = document.getElementById('host-area');
  const btnStart = document.getElementById('btn-start');
  const startHint = document.getElementById('start-hint');
  const botSummary = document.getElementById('bot-summary');
  const btnAddBot = document.getElementById('btn-add-bot');
  const btnRemoveBot = document.getElementById('btn-remove-bot');

  const bots = players.filter((p) => p.is_bot);
  const humans = players.filter((p) => !p.is_bot);
  botSummary.textContent = `当前 ${bots.length} 名人机，真人 ${humans.length} 人`;

  if (isHost) {
    btnReady.style.display = 'none';
    hostArea.style.display = 'flex';

    const others = players.filter((p) => !p.is_host);
    const allReady = others.every((p) => p.is_bot || p.is_ready);
    const enough = players.length >= 3;

    btnAddBot.disabled = players.length >= 7;
    btnRemoveBot.disabled = bots.length === 0;

    if (!enough) {
      btnStart.disabled = true;
      startHint.textContent = `还需要 ${3 - players.length} 位玩家`;
    } else if (!allReady && others.length > 0) {
      btnStart.disabled = true;
      startHint.textContent = '等待真人玩家全部准备';
    } else {
      btnStart.disabled = false;
      startHint.textContent = `${players.length} 位玩家已满足开局条件`;
    }
  } else {
    btnReady.style.display = 'block';
    hostArea.style.display = 'none';
    btnReady.textContent = isReady ? '取消准备' : '准备';
    btnReady.classList.toggle('btn-primary', !isReady);
    btnReady.classList.toggle('btn-secondary', isReady);
  }
}

function toggleReady() {
  gameWS.send('player_ready');
}

function addBot() {
  gameWS.send('add_bot');
}

function removeBot() {
  gameWS.send('remove_bot');
}

function startGame() {
  document.getElementById('btn-start').disabled = true;
  gameWS.send('start_game');
}

function handleLeave() {
  gameWS.disconnect();
}

function copyToClipboard(text) {
  const textArea = document.createElement('textarea');
  textArea.value = text;
  textArea.style.position = 'fixed';
  textArea.style.left = '-9999px';
  textArea.style.top = '0';
  document.body.appendChild(textArea);
  textArea.focus();
  textArea.select();
  return new Promise((resolve, reject) => {
    document.execCommand('copy') ? resolve() : reject();
    document.body.removeChild(textArea);
  });
}

function copyLink() {
  if (!roomCode) return;
  const url = `${location.origin}/?code=${roomCode}`;
  copyToClipboard(url)
    .then(() => flash('btn-copy-link', '已复制'))
    .catch(() => showToast('复制失败', 'error'));
}

function copyCode() {
  if (!roomCode) return;
  copyToClipboard(roomCode)
    .then(() => flash('btn-copy-code', '已复制'))
    .catch(() => showToast('复制失败', 'error'));
}

function flash(id, text) {
  const btn = document.getElementById(id);
  const orig = btn.textContent;
  btn.textContent = text;
  btn.classList.add('copied');
  setTimeout(() => {
    btn.textContent = orig;
    btn.classList.remove('copied');
  }, 2000);
}

function setConnectingText(text) {
  document.getElementById('connecting-text').textContent = text;
}

function hideConnectingOverlay() {
  const el = document.getElementById('connecting-overlay');
  if (el) el.remove();
}

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function avatarEmoji(name) {
  const pool = ['🐯', '🦊', '🐼', '🐧', '🦁', '🐸', '🐵', '🐨', '🐳', '🦄'];
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffff;
  return pool[h % pool.length];
}
</script>
</body>
</html>
